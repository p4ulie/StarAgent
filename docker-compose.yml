# StarAgent stack. The LLM is NOT here — run your own llama.cpp server and point
# LLM_BASE_URL at it (e.g. http://host.docker.internal:8080/v1).
#
#   cp .env.example .env   # set DISCORD_TOKEN (and LLM_BASE_URL if needed)
#   docker compose up --build
#   docker compose run --rm bot star-agent-ingest   # (re)build the knowledge base

services:
  chroma:
    image: chromadb/chroma
    volumes:
      - ./chroma-data:/data
    restart: unless-stopped
    # Not published to the host — only reachable on the internal compose network.

  bot:
    build: .
    image: star-agent:latest
    command: ["star-agent-bot"]
    env_file: .env
    environment:
      # Use LiteLLM's bundled cost map — never fetch it over the network
      # (avoids an event-loop stall / heartbeat block on the first request).
      LITELLM_LOCAL_MODEL_COST_MAP: "True"
    volumes:
      # Persist the local embedding-model cache across (re)runs.
      - model-cache:/home/app/.cache
    depends_on:
      - chroma
    extra_hosts:
      # Lets the container reach a llama.cpp server running on the host.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  mcp:
    image: star-agent:latest
    build: .
    command: ["star-agent-mcp"]
    env_file: .env
    environment:
      LITELLM_LOCAL_MODEL_COST_MAP: "True"
    volumes:
      - model-cache:/home/app/.cache
    depends_on:
      - chroma
    ports:
      - "${MCP_PORT:-8765}:8765"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  # Named volume: embedding-model cache (internal, ~80 MB after first download).
  # The knowledge base itself lives in ./chroma-data (bind mount) for easy
  # inspection and backup.
  model-cache:
